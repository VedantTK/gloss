version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gloss-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-300}
      - TOP_N_STOCKS=${TOP_N_STOCKS:-10}
    networks:
      - gloss-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass empty string so React uses relative /api/ URLs → Nginx proxies to backend
        - REACT_APP_API_URL=
    container_name: gloss-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gloss-net
    restart: unless-stopped

networks:
  gloss-net:
    driver: bridge
